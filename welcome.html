<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Foodiez – Welcome</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            pacifico: ['Pacifico', 'cursive'],
            fredoka:  ['Fredoka One', 'cursive'],
            nunito:   ['Nunito', 'sans-serif'],
          },
          colors: {
            brand: '#f97316',
            'brand-dark': '#c2410c',
          },
          keyframes: {
            fadeUp: {
              '0%':   { opacity: '0', transform: 'translateY(28px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
            shimmer: {
              '0%':   { transform: 'translateX(-100%)' },
              '100%': { transform: 'translateX(100%)' },
            },
          },
          animation: {
            'fade-up-1': 'fadeUp .7s cubic-bezier(.22,1,.36,1) .2s both',
            'fade-up-2': 'fadeUp .8s cubic-bezier(.22,1,.36,1) .4s both',
            'fade-up-3': 'fadeUp .7s cubic-bezier(.22,1,.36,1) .6s both',
            'fade-up-4': 'fadeUp .7s cubic-bezier(.22,1,.36,1) .8s both',
            'fade-up-5': 'fadeUp .7s cubic-bezier(.22,1,.36,1) 1s both',
          },
          backgroundImage: {
            'hero': "url(images/welcome.jpeg)"
          },
        },
      },
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Fredoka+One&family=Nunito:wght@400;600&display=swap" rel="stylesheet"/>
  <!-- Minimal CSS: only what Tailwind can't do (text-shadow, ::after, clamp) -->
  <style>
    .welcome-text  { font-size: clamp(1.4rem, 4vw, 2rem);   text-shadow: 2px 2px 0 rgba(0,0,0,.4); }
    .logo-text     { font-size: clamp(3.5rem, 10vw, 6rem);  text-shadow: 0 0 40px rgba(249,115,22,.35), 4px 4px 0 rgba(0,0,0,.5); letter-spacing:.05em; }
    .tagline       { font-size: clamp(.85rem, 2.5vw, 1rem); }
    .divider-line  { background: linear-gradient(to right, transparent, #c2410c, transparent); }

  </style>
</head>

<body class="font-nunito min-h-screen overflow-hidden bg-hero bg-cover bg-center bg-no-repeat flex items-center justify-center">

  <div class="flex flex-col items-center gap-5 px-6 text-center">

    <!-- Welcome -->
    <div class="flex items-center gap-3 animate-fade-up-1">
      <span class="text-brand text-2xl select-none">✦</span>
      <p class="welcome-text font-pacifico text-brand " >Welcome</p>
      <span class="text-brand text-2xl select-none">✦</span>
    </div>

    <!-- Logo -->
    <h1 class="font-fredoka text-[#F59E0B] text-[clamp(3.5rem,10vw,6rem)] tracking-wide animate-fade-up-2 drop-shadow-[0_0_40px_rgba(245,158,11,0.6)]">FOODIEZ</h1>

    <!-- Divider -->
    <div class="flex items-center gap-2 w-64 animate-fade-up-3">
      <div class="divider-line flex-1 h-px"></div>
      <span class="text-orange-600 text-lg select-none"><img src="images/ligne.png" alt=""></span>
      <div class="divider-line flex-1 h-px"></div>
    </div>

    <!-- Tagline -->
    <p class="tagline text-gray-300 text-center leading-relaxed max-w-xs animate-fade-up-4">
      Une application innovante pour gérer vos<br/>
      commandes facilement et en temps réel.
    </p>

    <!-- CTA -->
     <a href="index.html">
    <button class="btn-start mt-6 font-fredoka text-lg tracking-widest text-black bg-[#f97316] rounded-full px-11 py-3 border-none cursor-pointer animate-fade-up-5 transition-all duration-300 hover:bg-[#F59E0B] hover:shadow-[0_0_25px_6px_rgba(249,115,22,0.6)] hover:text-white">
      commencer
    </button>
     </a>
  </div>
</body>
</html>
